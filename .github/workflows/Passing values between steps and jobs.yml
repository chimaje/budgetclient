name: Passing Values to Next Steps

on:  workflow_dispatch

jobs:
  passing-values-bw-steps:
    runs-on: ubuntu-latest
     # Map a step output to a job output
    outputs:
      output1: ${{ steps.step1.outputs.test }}
      output2: ${{ steps.step2.outputs.test }}
    steps:
    - name: Set the value using ENV Vars
      run: |
        echo "variableName=this-is-value" >> $GITHUB_ENV


    - name: Create-Variables
      id: var_source_step
      run: |
        echo "Performing a random task"
        echo "name=var1_name::TechSckool" >> $GITHUB_OUTPUT
        echo "name=var2_date::$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT
    - id: step1
      run: echo "name=test::ImportantValue1" >> $GITHUB_OUTPUT
    - id: step2
      run: echo "name=test::ImportantValue2" >> $GITHUB_OUTPUT


    - name: Get-Variable-Value
      run: |
        echo "Printing the values"
        echo variableName: ${{ env.variableName }} 
        echo var1_name: ${{ steps.var_source_step.outputs.var1_name }} 
        echo var2_date: ${{ steps.var_source_step.outputs.var2_date }}
  job2:
    runs-on: ubuntu-latest
    needs: passing-values-bw-steps
    steps:
      - run: |
          echo "Printing the values"
          echo output1: ${{needs.passing-values-bw-steps.outputs.output1}}
          echo output2: ${{needs.passing-values-bw-steps.outputs.output2}}

